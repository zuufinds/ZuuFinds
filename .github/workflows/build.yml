name: Build Site

on:
  push:
    paths:
      - 'products.json'
      - 'index-template.html'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build index.html from template + products
        run: python3 build.py

      - name: Commit and push index.html
        run: |
          git config user.name "Zuu Finds Bot"
          git config user.email "bot@zuufinds.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Auto-build: update index.html from products"
          git push
